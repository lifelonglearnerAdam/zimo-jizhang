name: zimo_jizhang
description: "子墨记账 - 本地优先的全平台个人记账应用"
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 数据库 - SQLite（无需代码生成）
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.1.1

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 图表
  fl_chart: ^0.70.2

  # 文件处理
  csv: ^6.0.0
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.7

  # 网络（同步用）
  http: ^1.2.2
  webdav_client: ^1.2.1

  # 工具
  intl: ^0.20.2
  uuid: ^4.5.1

  # 桌面窗口管理
  window_manager: ^0.4.3

  # 智能功能（手机端专用）
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
